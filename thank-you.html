<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Provenance Counseling</title>
<meta name="description" content="Thank you for reaching out to Provenance Counseling. We'll be in touch within one business day.">
<link rel="canonical" href="https://provenancecounseling.com/thank-you.html">
<meta property="og:title" content="Thank You | Provenance Counseling">
<meta property="og:description" content="Thank you for reaching out to Provenance Counseling. We'll be in touch within one business day.">
<meta property="og:url" content="https://provenancecounseling.com/thank-you.html">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --stone: #8A8578;
  --stone-light: #B8B2A6;
  --stone-pale: #D4CFC6;
  --amber: #C4943A;
  --slate: #4A4F54;
  --charcoal: #2E3134;
  --deep: #1E2124;
  --cream: #FAF7F2;
  --warm-white: #FDFCF9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  color: var(--charcoal);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  text-align: center;
}

h1 {
  font-family: 'Cormorant', serif;
  font-weight: 300;
  font-size: clamp(2rem, 4vw, 2.8rem);
  color: var(--charcoal);
  line-height: 1.2;
  margin-bottom: 1.25rem;
}

p {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: 0.95rem;
  color: var(--slate);
  line-height: 1.8;
  max-width: 480px;
  margin-bottom: 2.5rem;
}

a {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cream);
  background: var(--charcoal);
  border: 1px solid var(--charcoal);
  padding: 1rem 2.5rem;
  border-radius: 3px;
  text-decoration: none;
  transition: all 0.3s ease;
}

a:hover {
  background: var(--amber);
  border-color: var(--amber);
  color: var(--deep);
}

/* Entrance animation */
h1 {
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.8s ease 0.3s forwards;
}
p {
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.8s ease 0.7s forwards;
}
a {
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.8s ease 1.1s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<h1>Thank you for reaching out.</h1>
<p>We've received your message and will get back to you within one business day. In the meantime, take a breath. The hardest part was showing up, and you just did.</p>
<a href="/">Back to Home</a>

</body>
</html>
